name: 构建发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Windows CLI + GUI ──
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: 安装 Rust MSVC
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 构建 CLI
        run: cargo build --release -p volc_auc_batch_client

      - name: 复制 CLI 到 dist
        run: cp target/release/volc_auc_batch_client.exe dist/

      - name: 安装 Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: 构建 Windows GUI
        run: |
          cd src-tauri
          npm init -y
          npx tauri build

      - name: 复制 GUI 到 dist
        run: |
          cp target/release/doubao-transcriber.exe dist/
          cp target/release/bundle/msi/*.msi dist/ 2>$null || true

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/

  # ── macOS Universal (Intel + Apple Silicon) ──
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: 安装 Rust 目标
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 构建 Mac ARM64 CLI
        run: cargo build --release -p volc_auc_batch_client

      - name: 复制 CLI 到 dist
        run: cp target/release/volc_auc_batch_client dist/

      - name: 安装 Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: 构建 Mac GUI
        run: |
          cd src-tauri
          npm init -y
          npx tauri build

      - name: 复制 .app 到 dist
        run: |
          cp -R target/release/bundle/macos/豆包语音转文字.app dist/ 2>/dev/null || echo "no .app found"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: dist/
